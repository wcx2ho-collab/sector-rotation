<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>섹터 로테이션 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Pretendard:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:        #0a0e17;
  --bg-soft:   #0d1220;
  --panel:     #111827;
  --panel-2:   #1a2332;
  --panel-3:   #1e2a3a;
  --border:    #1f2d3d;
  --border-hi: #2e4057;
  --text:      #e2eaf3;
  --text-2:    #8fa4bc;
  --muted:     #4a6080;
  --up:        #26a69a;
  --up-2:      #1de9b6;
  --down:      #ef5350;
  --down-2:    #ff5252;
  --accent:    #2962ff;
  --gold:      #ffa726;
  --r-5: 5px;
  --r-8: 8px;
  --r-10: 10px;
}
html, body { min-height: 100vh; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Pretendard Variable', 'Pretendard', 'Inter', system-ui, sans-serif;
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  letter-spacing: -0.005em;
  padding: 16px;
}
.container { max-width: 1400px; margin: 0 auto; }
.mono {
  font-family: 'JetBrains Mono', monospace;
  font-feature-settings: 'tnum' 1;
  font-variant-numeric: tabular-nums;
}

/* ── Header ── */
header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 18px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--r-10);
  margin-bottom: 14px;
  gap: 12px;
  flex-wrap: wrap;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-dot {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--muted); flex-shrink: 0;
}
.brand-dot.ok { background: var(--up); box-shadow: 0 0 10px var(--up); }
.brand-dot.err { background: var(--down); box-shadow: 0 0 10px var(--down); }
.brand-dot.loading { background: var(--gold); box-shadow: 0 0 10px var(--gold); animation: blink 1s ease-in-out infinite; }
@keyframes blink { 50% { opacity: 0.3; } }
.brand h1 { font-size: 15px; font-weight: 700; letter-spacing: -0.02em; line-height: 1; }
.brand-sub { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 3px; }
.header-right { display: flex; align-items: center; gap: 10px; }
.updated { font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--muted); }

/* ── Buttons ── */
button {
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: var(--r-8);
  padding: 8px 16px;
  font-family: 'Pretendard Variable', 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
}
button:hover:not(:disabled) { filter: brightness(1.15); }
button:disabled { background: var(--panel-2); color: var(--muted); cursor: not-allowed; filter: none; }
button.ghost {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-2);
  padding: 7px 12px;
  font-size: 11px;
}
button.ghost:hover:not(:disabled) { border-color: var(--border-hi); color: var(--text); filter: none; }
button.icon-btn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-2);
  padding: 7px 10px;
  border-radius: var(--r-8);
  font-size: 13px;
}
button.icon-btn:hover { border-color: var(--border-hi); color: var(--text); filter: none; }

/* ── Card ── */
.card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--r-10);
  padding: 16px;
  margin-bottom: 12px;
}

/* ── API Key modal overlay ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.7);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  animation: fadeIn 0.15s ease;
}
.modal-overlay.hidden { display: none; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--r-10);
  padding: 22px;
  width: 100%;
  max-width: 440px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}
.modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.modal p { font-size: 12px; color: var(--muted); margin-bottom: 16px; }
.modal .key-row { display: flex; gap: 6px; margin-bottom: 10px; }
.modal input[type="password"], .modal input[type="text"] {
  flex: 1; min-width: 0;
  background: var(--bg-soft);
  border: 1px solid var(--border);
  border-radius: var(--r-8);
  padding: 10px 12px;
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  outline: none;
}
.modal input:focus { border-color: var(--accent); }
.modal-actions { display: flex; gap: 8px; justify-content: flex-end; align-items: center; margin-top: 12px; }
.modal-msg {
  flex: 1;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
}
.modal-msg.ok { color: var(--up); }
.modal-msg.err { color: var(--down); }

/* ── Benchmarks Grid (SPY, QQQ, SOX) ── */
.benchmarks-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 14px;
  margin-bottom: 14px;
}
.benchmark-card {
  display: flex;
  flex-direction: column;
  gap: 10px;
  padding: 14px 18px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--r-10);
}
.benchmark-header {
  display: flex;
  align-items: center;
  gap: 10px;
}
.benchmark-badge {
  background: var(--accent);
  color: #fff;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 4px;
  letter-spacing: 0.04em;
}
.benchmark-price {
  font-family: 'JetBrains Mono', monospace;
  font-size: 20px;
  font-weight: 700;
  letter-spacing: -0.02em;
}
.benchmark-label {
  font-size: 10px;
  color: var(--muted);
  margin-bottom: 2px;
}
.benchmark-periods {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.benchmark-period { text-align: center; }
.benchmark-period-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 2px;
}
.benchmark-period-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: -0.01em;
}

@media (max-width: 900px) {
  .benchmarks-grid {
    grid-template-columns: 1fr;
    gap: 10px;
  }
  .benchmark-card {
    padding: 12px 14px;
  }
  .benchmark-price {
    font-size: 18px;
  }
}
.sep { width: 1px; background: var(--border); height: 40px; flex-shrink: 0; }

/* ── Info bar ── */
.info-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 14px;
  margin-bottom: 10px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--r-8);
  font-size: 11px;
  color: var(--muted);
  font-family: 'JetBrains Mono', monospace;
}
.info-bar b { color: var(--text-2); font-weight: 600; }

/* ── Main Table ── */
.tbl-wrap {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--r-10);
  overflow: hidden;
}
.tbl-header {
  display: grid;
  grid-template-columns: 36px 200px 110px 90px 68px 68px 68px 68px 68px 80px 110px 80px 60px 72px 72px;
  gap: 0;
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-soft);
}
.th {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-align: right;
  padding: 0 4px;
  user-select: none;
}
.th.sortable {
  cursor: pointer;
  transition: color 0.1s;
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 3px;
}
.th.sortable:hover { color: var(--text-2); }
.th.active-col { color: var(--gold); }
.th.col-first { text-align: center; }
.th.col-name  { text-align: left; padding-left: 0; }
.th .sort-ind { font-size: 8px; opacity: 0.7; }

/* ── ETF Row ── */
.etf-row {
  display: grid;
  grid-template-columns: 36px 200px 110px 90px 68px 68px 68px 68px 68px 80px 110px 80px 60px 72px 72px;
  gap: 0;
  padding: 12px 14px;
  border-bottom: 1px solid rgba(31, 45, 61, 0.5);
  cursor: pointer;
  transition: background 0.1s;
  align-items: center;
}
.etf-row:hover { background: rgba(255,255,255,0.015); }
.etf-row.expanded { background: rgba(41, 98, 255, 0.04); border-left: 2px solid var(--accent); }
.etf-row.expanded:hover { background: rgba(41, 98, 255, 0.07); }

.rank {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  text-align: center;
  font-weight: 600;
}
.etf-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
.etf-name-ko { font-weight: 600; font-size: 13px; letter-spacing: -0.01em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.etf-ticker {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.04em;
}
.spark-cell {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 4px;
}
.spark-svg {
  width: 100px;
  height: 30px;
  overflow: visible;
}
.spark-empty {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--muted);
}
.cell {
  text-align: right;
  padding: 0 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  font-variant-numeric: tabular-nums;
}
.cell.price { font-size: 13px; font-weight: 600; color: var(--text); padding-right: 8px; }
.pct { font-weight: 500; font-size: 11px; }
.pct.up   { color: var(--up); }
.pct.down { color: var(--down); }
.pct.zero { color: var(--muted); }
.pct.active-period { font-weight: 700; font-size: 12px; }

/* ── Position + vs SPY cell ── */
.pos-cell {
  display: flex;
  flex-direction: column;
  gap: 4px;
  padding: 0 6px;
  border-left: 1px solid var(--border);
}
.pos-bar-wrap {
  position: relative;
  height: 4px;
  background: var(--panel-3);
  border-radius: 2px;
  overflow: hidden;
}
.pos-bar-fill {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  border-radius: 2px;
  background: linear-gradient(90deg, var(--down), var(--gold) 50%, var(--up));
  opacity: 0.55;
}
.pos-marker {
  position: absolute;
  top: -1px;
  width: 2px;
  height: 6px;
  border-radius: 1px;
  background: var(--text);
  transform: translateX(-50%);
}
.pos-labels {
  display: flex;
  justify-content: flex-start;
  align-items: center;
}
.pos-pct-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  font-variant-numeric: tabular-nums;
  color: var(--text-2);
  font-weight: 600;
}
.vs-spy-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-variant-numeric: tabular-nums;
  font-weight: 600;
}
.vs-spy-val.up   { color: var(--up); }
.vs-spy-val.down { color: var(--down); }
.vs-spy-val.zero { color: var(--muted); }

/* ── Stat cells (beta, from-high, from-low) ── */
.stat-cell {
  text-align: right;
  padding: 0 8px 0 4px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-variant-numeric: tabular-nums;
}
.stat-cell .label {
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 0.04em;
  display: block;
  margin-bottom: 2px;
}
.stat-cell .val { font-weight: 600; }
.stat-cell .val.up   { color: var(--up); }
.stat-cell .val.down { color: var(--down); }
.stat-cell .val.zero { color: var(--muted); }
.stat-cell .val.beta-hi  { color: #f59e0b; }
.stat-cell .val.beta-lo  { color: #6366f1; }
.stat-cell .val.beta-mid { color: var(--text-2); }
.th.group-sep { border-left: 1px solid var(--border); }

/* ── Stock sub-rows ── */
.stocks-panel {
  background: var(--bg-soft);
  border-bottom: 1px solid var(--border);
}
.stocks-header {
  display: grid;
  grid-template-columns: 36px 200px 110px 90px 68px 68px 68px 68px 68px 80px 110px 80px 60px 72px 72px;
  gap: 0;
  padding: 6px 14px;
  border-bottom: 1px solid var(--border);
}
.stock-sub-row {
  display: grid;
  grid-template-columns: 36px 200px 110px 90px 68px 68px 68px 68px 68px 80px 110px 80px 60px 72px 72px;
  gap: 0;
  padding: 8px 14px;
  border-bottom: 1px solid rgba(31, 45, 61, 0.3);
  align-items: center;
  transition: background 0.1s;
}
.stock-sub-row:hover { background: rgba(255,255,255,0.01); }
.stock-sub-row:last-child { border-bottom: none; }
.stock-dot {
  width: 5px; height: 5px; border-radius: 50%;
  margin: 0 auto;
  background: var(--muted);
}
.stock-ticker {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-2);
  letter-spacing: 0.02em;
  margin-bottom: 1px;
}
.stock-name { font-size: 11px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.loading-stocks {
  padding: 20px;
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
}

/* ── Mobile Card View ── */
.mobile-wrap { display: none; }
.mobile-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: var(--r-10);
  padding: 12px 14px;
  margin-bottom: 8px;
  cursor: pointer;
}
.mobile-card.expanded {
  border-color: var(--accent);
}
.mobile-card-row1 {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 8px;
}
.mobile-rank {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--muted);
  min-width: 20px;
}
.mobile-name {
  flex: 1;
  display: flex;
  flex-direction: column;
}
.mobile-name-ko {
  font-size: 14px;
  font-weight: 700;
  line-height: 1.2;
}
.mobile-ticker {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 0.04em;
  margin-top: 2px;
}
.mobile-price {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 700;
  text-align: right;
}
.mobile-card-row2 {
  display: grid;
  grid-template-columns: 1fr 1fr 1.2fr;
  gap: 8px;
  align-items: center;
  padding-top: 8px;
  border-top: 1px solid rgba(31,45,61,0.5);
}
.mobile-metric {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.mobile-metric-label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  color: var(--muted);
  letter-spacing: 0.06em;
}
.mobile-metric-val {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}
.mobile-pos-wrap {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.mobile-pos-bar {
  position: relative;
  height: 4px;
  background: var(--panel-3);
  border-radius: 2px;
  overflow: hidden;
}
.mobile-pos-fill {
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, var(--down), var(--gold) 50%, var(--up));
  opacity: 0.55;
}
.mobile-pos-marker {
  position: absolute;
  top: -1px;
  width: 2px;
  height: 6px;
  background: var(--text);
  transform: translateX(-50%);
}
.mobile-pos-label {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
}
.mobile-pos-pct {
  color: var(--text-2);
  font-weight: 600;
}
.mobile-sort-bar {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding: 10px 0;
  margin-bottom: 4px;
  -webkit-overflow-scrolling: touch;
}
.mobile-sort-bar::-webkit-scrollbar { display: none; }
.mobile-sort-btn {
  flex: 0 0 auto;
  padding: 6px 14px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--text-2);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
}
.mobile-sort-btn.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
  font-weight: 700;
}
.mobile-expand {
  margin-top: 8px;
  padding-top: 10px;
  border-top: 1px dashed rgba(31,45,61,0.7);
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px 12px;
}
.mobile-expand-item {
  display: flex;
  justify-content: space-between;
  font-size: 11px;
  font-family: 'JetBrains Mono', monospace;
}
.mobile-expand-label { color: var(--muted); }
.mobile-expand-val { font-weight: 600; }
.mobile-stocks {
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px dashed rgba(31,45,61,0.7);
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.mobile-stock-row {
  display: grid;
  grid-template-columns: 1fr auto auto;
  gap: 8px;
  align-items: center;
  padding: 6px 0;
  font-size: 11px;
}
.mobile-stock-info {
  display: flex;
  flex-direction: column;
}
.mobile-stock-sym {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 11px;
}
.mobile-stock-name {
  font-size: 10px;
  color: var(--muted);
  margin-top: 1px;
}
.mobile-stock-price {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  text-align: right;
  min-width: 55px;
}
.mobile-stock-pct {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  text-align: right;
  min-width: 52px;
}

@media (max-width: 768px) {
  .tbl-wrap { display: none; }
  .mobile-wrap { display: block; }
  #infoBar { display: none !important; }
}


.empty-state {
  padding: 60px 20px;
  text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 12px;
}
.empty-state h3 { font-size: 16px; font-weight: 700; color: var(--text-2); }
.empty-state p  { color: var(--muted); font-size: 12px; }

.progress-wrap {
  padding: 50px 20px;
  display: flex; flex-direction: column; align-items: center; gap: 14px;
}
.spinner { width: 36px; height: 36px; border: 2.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.progress-text { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--text-2); }
.progress-bar { width: 280px; height: 3px; background: var(--bg-soft); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); transition: width 0.2s; }
.progress-sub  { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--muted); }

.error-box {
  background: rgba(239,83,80,0.08); border: 1px solid rgba(239,83,80,0.35); color: var(--down);
  border-radius: var(--r-8); padding: 14px 16px; font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.6;
}

.footer {
  text-align: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px; color: var(--muted);
  padding: 14px 0 4px; letter-spacing: 0.03em;
}
a.link { color: var(--accent); text-decoration: none; }
a.link:hover { text-decoration: underline; }

// ─── Fetch helpers ─────────────────────────────────────
async function fetchQuote(sym) {
  const r = await fetch(`${BASE}/quote?symbol=${sym}&token=${getApiKey()}`);
  if (!r.ok) throw new Error("HTTP " + r.status);
  return r.json();
}
async function fetchMetric(sym) {
  const r = await fetch(`${BASE}/stock/metric?symbol=${sym}&metric=all&token=${getApiKey()}`);
  if (!r.ok) throw new Error("HTTP " + r.status);
  const d = await r.json();
  return d.metric || {};
}

// Sparkline: synthesize from period returns already fetched.
// No additional API call needed.
// Points: [3M ago, 1M ago, 5D ago, 1D ago, now]
function buildSyntheticCandle(d) {
  if (!d || d.price == null) return null;
  const p = d.price;
  const pts = [];
  // Each return is % from that point to today, so back-calculate
  if (d.m3  != null) pts.push({ t: 0, v: p / (1 + d.m3  / 100) });
  if (d.m1  != null) pts.push({ t: 1, v: p / (1 + d.m1  / 100) });
  if (d.d5  != null) pts.push({ t: 2, v: p / (1 + d.d5  / 100) });
  if (d.d1  != null) pts.push({ t: 3, v: p / (1 + d.d1  / 100) });
  pts.push({ t: 4, v: p });
  // Need at least 3 points for a meaningful chart
  if (pts.length < 3) return null;
  // Sort by t and return values array
  pts.sort((a, b) => a.t - b.t);
  return pts.map(pt => pt.v);
}

function extractPeriods(quote, metric) {
  return {
    d1:  quote?.dp ?? null,
    d5:  metric?.["5DayPriceReturnDaily"] ?? null,
    m1:  metric?.["monthToDatePriceReturnDaily"] ?? null,
    m3:  metric?.["13WeekPriceReturnDaily"] ?? null,
    ytd: metric?.["yearToDatePriceReturnDaily"] ?? null,
    y1:  metric?.["52WeekPriceReturnDaily"] ?? null,
    price:    quote?.c ?? null,
    yearHigh: metric?.["52WeekHigh"] ?? null,
    yearLow:  metric?.["52WeekLow"]  ?? null,
    beta:     metric?.["beta"]       ?? null,
  };
}

  $("infoBar").style.display = "none";
  renderProgress(0, "ETF 기본 데이터");

  const allEtfs = [...BENCHMARKS.map(b => b.sym), ...SECTORS.map(s => s.key)];
  let done = 0;
  const result = {};

  async function fetchBasic(sym) {
    const [q, m] = await Promise.all([fetchQuote(sym), fetchMetric(sym)]);
    result[sym] = extractPeriods(q, m);
    done++;
    renderProgress(done / allEtfs.length, `ETF · ${done}/${allEtfs.length}`);
  }

  const queue = [...allEtfs];
  async function worker() { while (queue.length > 0) { await fetchBasic(queue.shift()); } }

  try {
    await Promise.all(Array(4).fill(0).map(worker));
    if (!result[SPY.sym]) throw new Error("데이터를 받지 못했습니다. API 키를 확인하세요.");
    state.etfData = result;
    // Build synthetic sparklines from already-fetched period returns (no extra API calls)
    BENCHMARKS.forEach(bench => {
      const d = result[bench.sym];
      if (d) d.candle = buildSyntheticCandle(d);
    });
    SECTORS.forEach(sec => {
      const d = result[sec.key];
      if (d) d.candle = buildSyntheticCandle(d);
    });

    $("statusDot").className = "brand-dot ok";
    $("updatedTime").textContent = new Date().toLocaleTimeString();
    $("infoBar").style.display = "";
  } catch (e) {
    state.error = e.message;
    $("statusDot").className = "brand-dot err";
  } finally {
    state.loading = false;
    $("loadBtn").disabled = false;
    $("loadBtn").textContent = "새로고침";
    renderAll();
  }
}

// ─── On-demand stock load ──────────────────────────────
async function loadStocks(sectorKey) {
  if (state.stockData[sectorKey] || state.loadingStocks[sectorKey]) return;
  state.loadingStocks[sectorKey] = true;
  renderAll();

  const sec = SECTORS.find(s => s.key === sectorKey);
  if (!sec) return;

  const result = [];
  const queue = [...sec.stocks];
  async function worker() {
    while (queue.length > 0) {
      const stk = queue.shift();
      try {
        const [q, m] = await Promise.all([fetchQuote(stk.sym), fetchMetric(stk.sym)]);
        result.push({ ...stk, ...extractPeriods(q, m) });
      } catch { result.push({ ...stk, price: null }); }
    }
  }
  await Promise.all(Array(4).fill(0).map(worker));

  state.stockData[sectorKey] = result;
  state.loadingStocks[sectorKey] = false;
  renderAll();
}

// ─── Helpers ───────────────────────────────────────────
function fmtPrice(v) { return v == null ? "—" : "$" + v.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function fmtPct(v, large) {
  if (v == null) return '<span class="pct zero">—</span>';
  const cls = v > 0 ? "up" : v < 0 ? "down" : "zero";
  const str = (v > 0 ? "+" : "") + v.toFixed(2) + "%";
  return `<span class="pct ${cls}${large ? " active-period" : ""}">${str}</span>`;
}
function getPeriodVal(d, pid) { return d ? d[pid] ?? null : null; }

// ─── Sparkline SVG ─────────────────────────────────────
function sparkline(data, isUp) {
  if (!data || data.length < 2) return '<span class="spark-empty">—</span>';
  const w = 100, h = 30, pad = 2;
  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  const step = (w - pad * 2) / (data.length - 1);
  const points = data.map((v, i) => {
    const x = pad + i * step;
    const y = pad + (h - pad * 2) * (1 - (v - min) / range);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  });
  const color = isUp ? "#26a69a" : "#ef5350";
  const fillColor = isUp ? "rgba(38,166,154,0.15)" : "rgba(239,83,80,0.15)";
  const polyline = points.join(" ");
  const areaPath = `M ${pad},${h - pad} L ${points.join(" L ")} L ${(pad + (data.length - 1) * step).toFixed(1)},${h - pad} Z`;
  return `
    <svg class="spark-svg" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none">
      <path d="${areaPath}" fill="${fillColor}" stroke="none"/>
      <polyline points="${polyline}" fill="none" stroke="${color}" stroke-width="1.4" stroke-linejoin="round" stroke-linecap="round"/>
    </svg>
  `;
}

function pctColor(v) {
  if (v == null) return "var(--muted)";
  if (v >  10) return "#00e676";
  if (v >   5) return "#26a69a";
  if (v >   0) return "#4caf50";
  if (v >  -5) return "#ef5350";
  if (v > -10) return "#e53935";
  return "#b71c1c";
}

function betaCell(d) {
  const b = d?.beta;
  if (b == null) return `<div class="stat-cell"><span class="label">β</span><span class="val zero">—</span></div>`;
  const cls = b > 1.2 ? "beta-hi" : b < 0.8 ? "beta-lo" : "beta-mid";
  return `<div class="stat-cell"><span class="label">BETA</span><span class="val ${cls}">${b.toFixed(2)}</span></div>`;
}

function fromHighCell(d) {
  if (d?.price == null || d?.yearHigh == null) return `<div class="stat-cell"><span class="label">고점대비</span><span class="val zero">—</span></div>`;
  const pct = ((d.price - d.yearHigh) / d.yearHigh) * 100;
  if (pct > 0) return `<div class="stat-cell"><span class="label">고점대비</span><span class="val up" style="font-size:10px; letter-spacing:-0.03em;">신고가</span></div>`;
  const cls = pct > -5 ? "zero" : pct > -20 ? "down" : "down";
  return `<div class="stat-cell"><span class="label">고점대비</span><span class="val ${cls}">${pct.toFixed(1)}%</span></div>`;
}

function fromLowCell(d) {
  if (d?.price == null || d?.yearLow == null) return `<div class="stat-cell"><span class="label">저점대비</span><span class="val zero">—</span></div>`;
  const pct = ((d.price - d.yearLow) / d.yearLow) * 100;
  const cls = pct > 20 ? "up" : pct > 5 ? "zero" : "down";
  const str = "+" + pct.toFixed(1) + "%";
  return `<div class="stat-cell"><span class="label">저점대비</span><span class="val ${cls}">${str}</span></div>`;
}
function positionBarCell(d) {
  if (!d || d.price == null || d.yearHigh == null || d.yearLow == null || d.yearHigh === d.yearLow) {
    return `<div class="pos-cell"><div class="pos-bar-wrap"><div class="pos-bar-fill" style="width:0;"></div></div><div class="pos-labels"><span class="pos-pct-val">—</span></div></div>`;
  }
  const posPct = ((d.price - d.yearLow) / (d.yearHigh - d.yearLow)) * 100;
  const clamp = Math.min(100, Math.max(0, posPct));
  return `
    <div class="pos-cell">
      <div class="pos-bar-wrap">
        <div class="pos-bar-fill" style="width:100%;"></div>
        <div class="pos-marker" style="left:${clamp}%;"></div>
      </div>
      <div class="pos-labels">
        <span class="pos-pct-val">${posPct.toFixed(0)}%</span>
      </div>
    </div>
  `;
}

function vsSpyCell(diff) {
  if (diff == null) return `<div class="cell"><span class="vs-spy-val zero">—</span></div>`;
  const cls = diff > 0.05 ? "up" : diff < -0.05 ? "down" : "zero";
  const str = (diff > 0 ? "+" : "") + diff.toFixed(2) + "%p";
  return `<div class="cell" style="text-align:right; padding-right:10px;"><span class="vs-spy-val ${cls}">${str}</span></div>`;
}

  const pid = state.sortPeriod;
  const pidLabel = PERIODS.find(p => p.id === pid)?.label || "1D";
  const pidVal = getPeriodVal(d, pid);
  const d1Val = d?.d1;

  const expanded = type === 'sector' ? state.expanded === entry.key : type === 'sox' ? state.expandedSOX : false;
  const clickHandler = type === 'sector' ? `onclick="toggleSector('${entry.key}')"` 
                     : type === 'sox'    ? `onclick="toggleSOX()"` 
                     : '';

  // Expanded stocks list for sectors
  let stocksHtml = '';
  if (expanded) {
    const stocks = type === 'sector' ? state.stockData[entry.key] : type === 'sox' ? state.soxData : null;
    const loading = type === 'sector' ? state.loadingStocks[entry.key] : state.loadingSOX;
    if (loading) {
      stocksHtml = `<div class="mobile-stocks"><div style="text-align:center; color:var(--muted); font-size:11px; padding:10px;">종목 로딩 중...</div></div>`;
    } else if (stocks) {
      const sorted = [...stocks].sort((a, b) => {
        const av = getPeriodVal(a, pid);
        const bv = getPeriodVal(b, pid);
        if (av == null && bv == null) return 0;
        if (av == null) return 1;
        if (bv == null) return -1;
        return state.sortAsc ? av - bv : bv - av;
      });
      stocksHtml = `<div class="mobile-stocks" onclick="event.stopPropagation()">` +
        sorted.map(s => {
          const sv = getPeriodVal(s, pid);
          const col = pctColor(sv);
          return `
            <div class="mobile-stock-row">
              <div class="mobile-stock-info">
                <span class="mobile-stock-sym">${s.sym}</span>
                <span class="mobile-stock-name">${s.nameKo}</span>
              </div>
              <span class="mobile-stock-price">${fmtPrice(s.price)}</span>
              <span class="mobile-stock-pct" style="color:${col};">${mobilePctStr(sv)}</span>
            </div>
          `;
        }).join('') +
      `</div>`;
    }
  }

  // Expanded extra metrics
  let expandHtml = '';
  if (expanded) {
    const vsSpyLabel = type === 'sox' ? 'vs SPY' : 'vs SPY';
    const spyVal = getPeriodVal(state.etfData[SPY.sym], pid);
    const dv = getPeriodVal(d, pid);
    const vsSpy = (spyVal != null && dv != null) ? dv - spyVal : null;
    const fromHi = (d?.price != null && d?.yearHigh != null) 
      ? ((d.price - d.yearHigh) / d.yearHigh) * 100 : null;
    const fromLo = (d?.price != null && d?.yearLow != null) 
      ? ((d.price - d.yearLow) / d.yearLow) * 100 : null;

    expandHtml = `
      <div class="mobile-expand">
        <div class="mobile-expand-item">
          <span class="mobile-expand-label">vs SPY</span>
          <span class="mobile-expand-val" style="color:${pctColor(vsSpy)};">${vsSpy == null ? '—' : (vsSpy > 0 ? '+' : '') + vsSpy.toFixed(2) + '%p'}</span>
        </div>
        <div class="mobile-expand-item">
          <span class="mobile-expand-label">BETA</span>
          <span class="mobile-expand-val" style="color:${d?.beta > 1.2 ? '#f59e0b' : d?.beta < 0.8 ? '#6366f1' : 'var(--text-2)'};">${d?.beta != null ? d.beta.toFixed(2) : '—'}</span>
        </div>
        <div class="mobile-expand-item">
          <span class="mobile-expand-label">고점대비</span>
          <span class="mobile-expand-val" style="color:${fromHi > 0 ? 'var(--up)' : fromHi > -5 ? 'var(--muted)' : 'var(--down)'};">${fromHi == null ? '—' : fromHi > 0 ? '신고가' : fromHi.toFixed(1) + '%'}</span>
        </div>
        <div class="mobile-expand-item">
          <span class="mobile-expand-label">저점대비</span>
          <span class="mobile-expand-val" style="color:${fromLo > 20 ? 'var(--up)' : fromLo > 5 ? 'var(--muted)' : 'var(--down)'};">${fromLo == null ? '—' : '+' + fromLo.toFixed(1) + '%'}</span>
        </div>
      </div>
    `;
  }

  const rankLabel = type === 'sox' ? 'SOX' : (idx + 1);
  const rankColor = type === 'sox' ? '#ef4444' : 'var(--muted)';
  const nameColor = type === 'sox' ? '#ef4444' : (entry.color || 'var(--text)');
  const borderStyle = type === 'sox' ? 'border-left:2px solid #ef4444;' : '';

  return `
    <div class="mobile-card ${expanded ? 'expanded' : ''}" ${clickHandler} style="${borderStyle}">
      <div class="mobile-card-row1">
        <span class="mobile-rank" style="color:${rankColor};">${rankLabel}</span>
        <div class="mobile-name">
          <span class="mobile-name-ko" style="color:${nameColor};">${entry.nameKo}</span>
          <span class="mobile-ticker">${entry.sym} ${expanded ? '▲' : '▼'}</span>
        </div>
        <span class="mobile-price">${fmtPrice(d?.price)}</span>
      </div>
      <div class="mobile-card-row2">
        <div class="mobile-metric">
          <span class="mobile-metric-label">1D</span>
          <span class="mobile-metric-val" style="color:${pctColor(d1Val)};">${mobilePctStr(d1Val)}</span>
        </div>
        <div class="mobile-metric">
          <span class="mobile-metric-label">${pidLabel}</span>
          <span class="mobile-metric-val" style="color:${pctColor(pidVal)};">${mobilePctStr(pidVal)}</span>
        </div>
        ${mobilePosBar(d)}
      </div>
      ${expandHtml}
      ${stocksHtml}
    </div>
  `;
}

function renderMobile() {
  const pid = state.sortPeriod;

  // Sort bar
  let html = `<div class="mobile-sort-bar">` +
    PERIODS.map(p => `
      <button class="mobile-sort-btn ${p.id === pid ? 'active' : ''}" onclick="sortBy('${p.id}')">${p.label}</button>
    `).join('') +
    `</div>`;

  // Sort sectors
  const sorted = [...SECTORS].sort((a, b) => {
    const av = getPeriodVal(state.etfData[a.key], pid);
    const bv = getPeriodVal(state.etfData[b.key], pid);
    if (av == null && bv == null) return 0;
    if (av == null) return 1;
    if (bv == null) return -1;
    return state.sortAsc ? av - bv : bv - av;
  });

  sorted.forEach((sec, idx) => {
    html += mobileCard({
      sym: sec.key,
      nameKo: sec.nameKo,
      color: sec.color,
      key: sec.key,
      data: state.etfData[sec.key]
    }, idx, 'sector');
  });

  // SOX section
  const soxxData = state.etfData['SOXX'];
  if (soxxData) {
    html += `<div style="margin-top:16px; padding-top:12px; border-top:1px solid var(--border);">`;
    html += mobileCard({
      sym: 'SOXX',
      nameKo: '필라델피아 반도체',
      data: soxxData
    }, 0, 'sox');
    html += `</div>`;
  }

  $("mobileContent").innerHTML = html;
}

// ─── Interactions ──────────────────────────────────────
window.sortBy = function(pid) {
  if (state.sortPeriod === pid) {
    state.sortAsc = !state.sortAsc;
  } else {
    state.sortPeriod = pid;
    state.sortAsc = false;
  }
  renderAll();
};

window.toggleSector = function(key) {
  if (state.expanded === key) {
    state.expanded = null;
    renderAll();
  } else {
    state.expanded = key;
    renderAll();
    if (!state.stockData[key] && !state.loadingStocks[key]) {
      loadStocks(key);
    }
  }
};

window.toggleSOX = function() {
  if (state.expandedSOX) {
    state.expandedSOX = false;
    renderAll();
  } else {
    state.expandedSOX = true;
    renderAll();
    if (!state.soxData && !state.loadingSOX) {
      loadSOX();
    }
  }
};

async function loadSOX() {
  state.loadingSOX = true;
  renderAll();
  
  const result = [];
  let done = 0;
  
  async function fetchStock(stockDef) {
    try {
      const [q, m] = await Promise.all([fetchQuote(stockDef.sym), fetchMetric(stockDef.sym)]);
      const data = extractPeriods(q, m);
      result.push({ ...stockDef, ...data });
      done++;
    } catch (e) {
      console.error(`Failed to fetch ${stockDef.sym}:`, e);
    }
  }
  
  const queue = [...SOX_STOCKS];
  async function worker() {
    while (queue.length > 0) {
      await fetchStock(queue.shift());
    }
  }
  
  try {
    await Promise.all(Array(4).fill(0).map(worker));
    state.soxData = result;
  } catch (e) {
    console.error("Failed to load SOX stocks:", e);
  }
  
  state.loadingSOX = false;
  renderAll();
}

// ─── Init ──────────────────────────────────────────────
// If no key stored, open modal on first visit
if (!getApiKey()) {
  setTimeout(openKeyModal, 300);
}
</script>
</body>
</html>
